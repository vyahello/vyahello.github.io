<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — Penni">
    <meta name="theme-color" content="#FF7A4D" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1714" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <title>Page not found — Penni</title>

    <style>
        :root {
            --coral: #FF7A4D;
            --bg: #FAF7F2;
            --text-primary: #1F1B17;
            --text-secondary: #6B6259;
            --hairline: rgba(31, 27, 23, 0.07);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1A1714;
                --text-primary: #F5F1EC;
                --text-secondary: #A39A8E;
                --hairline: rgba(255, 255, 255, 0.08);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }
        .logo {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            box-shadow: 0 8px 24px rgba(255, 122, 77, 0.3);
            margin-bottom: 32px;
        }
        h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -1.4px;
            margin-bottom: 12px;
        }
        @media (max-width: 540px) { h1 { font-size: 40px; } }
        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 480px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--coral);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 14px 28px;
            border-radius: 100px;
            box-shadow: 0 6px 20px rgba(255, 122, 77, 0.3);
            transition: transform 0.15s ease;
        }
        .btn-primary:hover { transform: translateY(-1px); }
    </style>
</head>
<body>
    <img class="logo" src="assets/icon-192.png" alt="Penni" width="96" height="96">
    <h1>404</h1>
    <p class="subtitle">This page doesn't exist — but your money still does. Let's get you back home.</p>
    <a class="btn-primary" href="index.html">← Back to Penni</a>
</body>
</html>
